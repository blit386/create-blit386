name: Publish

on:
  push:
    tags:
      # Release tags in this repo carry NO `v` prefix (0.1.0, 1.0.0, 1.1.0, 1.2.0), so a `v*`
      # filter would never fire. Keep this in step with the tags CREATE_BLIT386_DESIGN.md cuts.
      - '[0-9]+.[0-9]+.[0-9]+'

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4
        with:
          version: 10.26.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '22.18.0'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify package versions match tag
        run: |
          # Tags have no `v` prefix, so the tag name IS the version.
          TAG_VERSION="${GITHUB_REF_NAME}"
          KIT_VERSION=$(node -p "require('./packages/kit/package.json').version")
          CBT_VERSION=$(node -p "require('./packages/create-blit386/package.json').version")

          if [ "$KIT_VERSION" != "$TAG_VERSION" ] || [ "$CBT_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag ${TAG_VERSION} does not match package.json versions."
            echo "  @blit386/kit: ${KIT_VERSION}"
            echo "  create-blit386: ${CBT_VERSION}"
            exit 1
          fi

      - name: Build packages
        run: pnpm run build

      - name: Publish @blit386/kit
        run: |
          VERSION=$(node -p "require('./packages/kit/package.json').version")
          if npm view "@blit386/kit@${VERSION}" version >/dev/null 2>&1; then
            echo "@blit386/kit@${VERSION} already published; skipping."
          else
            pnpm publish --filter @blit386/kit --access public --no-git-checks
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish create-blit386
        run: |
          VERSION=$(node -p "require('./packages/create-blit386/package.json').version")
          if npm view "create-blit386@${VERSION}" version >/dev/null 2>&1; then
            echo "create-blit386@${VERSION} already published; skipping."
          else
            pnpm publish --filter create-blit386 --access public --no-git-checks
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
